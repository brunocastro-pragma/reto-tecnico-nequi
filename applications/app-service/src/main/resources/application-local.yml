# Local profile: PostgreSQL from docker-compose. No AWS involved.
spring:
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/franchise}
    username: ${DB_USERNAME:franchise}
    password: ${DB_PASSWORD:franchise}
  cloud:
    aws:
      # Otherwise the AWS starter tries to resolve a region on startup and fails on a machine
      # with no AWS credentials.
      secretsmanager:
        enabled: false

logging:
  level:
    co.com.nequi.franchise: DEBUG
    org.springframework.r2dbc: DEBUG
