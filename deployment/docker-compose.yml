services:
  postgres:
    image: postgres:16-alpine
    container_name: franchise-postgres
    environment:
      POSTGRES_DB: franchise
      POSTGRES_USER: franchise
      POSTGRES_PASSWORD: franchise
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U franchise -d franchise"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      # Context is the repository root: the Dockerfile copies every module's pom.
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: franchise-api
    depends_on:
      postgres:
        # service_healthy, not service_started: the app runs schema.sql on boot and would crash
        # against a Postgres that is up but not yet accepting connections.
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: r2dbc:postgresql://postgres:5432/franchise
      DB_USERNAME: franchise
      DB_PASSWORD: franchise
    ports:
      - "8080:8080"

volumes:
  postgres-data:
